<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyBee - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .setting-group {
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.07);
            overflow: hidden;
        }

        .setting-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 13px 14px;
            border-bottom: 1px solid #f1f5f9;
        }

        .setting-line:last-child {
            border-bottom: 0;
        }

        .setting-label {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
        }

        .setting-value {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-three-quarters"></i>
            </div>
        </div>

        <main class="page">
            <header class="top-nav space-12">
                <div class="row">
                    <button class="back-icon" data-back><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h1 class="title-lg">Settings</h1>
                        <p class="subtitle">Account, payments and privacy controls</p>
                    </div>
                </div>
            </header>

            <section class="section space-12">
                <div class="setting-group fade-in">
                    <div class="setting-line" data-toast="Address book opened">
                        <div>
                            <p class="setting-label">Addresses</p>
                            <p class="setting-value">2 saved addresses</p>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:#9ca3af;"></i>
                    </div>
                    <div class="setting-line" data-toast="Payment methods opened">
                        <div>
                            <p class="setting-label">Payment Methods</p>
                            <p class="setting-value">Visa •••• 8342</p>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:#9ca3af;"></i>
                    </div>
                    <div class="setting-line" data-nav="notifications">
                        <div>
                            <p class="setting-label">Notifications</p>
                            <p class="setting-value">Push + email enabled</p>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:#9ca3af;"></i>
                    </div>
                    <div class="setting-line" data-toast="Privacy controls opened">
                        <div>
                            <p class="setting-label">Privacy & Security</p>
                            <p class="setting-value">2FA active</p>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:#9ca3af;"></i>
                    </div>
                </div>

                <button class="btn btn-light fade-in" style="width:100%; color:#ef4444; border-color:#fecaca;" data-nav="login">Sign Out</button>
            </section>
        </main>

        <nav class="tab-bar">
            <div class="tab-item"><i class="fa-solid fa-house"></i></div>
            <div class="tab-item"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="tab-item"><i class="fa-solid fa-receipt"></i></div>
            <div class="tab-item"><i class="fa-regular fa-heart"></i></div>
            <div class="tab-item active"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
